<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Online Order</title>
</head>
<body>
    <h1>Order Form</h1> <!-- Changed title slightly as per example -->
    <form id="orderForm"> <!-- Added id, removed action and method -->
        <div>
            <label for="name">Name:</label>
            <input type="text" id="name" name="name" required>
        </div>
        <div>
            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required>
        </div>
        <div>
            <label for="shipping_address">Shipping Address:</label>
            <!-- Changed textarea to input type text as per example in description, but textarea is fine too. Sticking to original textarea for now. -->
            <textarea id="shipping_address" name="shipping_address" required></textarea>
        </div>
        <div>
            <label for="product">Product:</label>
            <input type="text" id="product" name="product" value="Essential" required> <!-- Default value for product -->
        </div>
        <div>
            <label for="quantity">Quantity:</label>
            <input type="number" id="quantity" name="quantity" value="1" min="1" required> <!-- Default value for quantity, kept min="1" -->
        </div>
        <div>
            <button type="submit">Submit Order</button>
        </div>
    </form>
    <!-- The messageDiv will be inserted here by the script -->

    <script>
    document.addEventListener('DOMContentLoaded', () => {
        const orderForm = document.getElementById('orderForm');
        const messageDiv = document.createElement('div');
        messageDiv.setAttribute('id', 'orderMessage');
        messageDiv.setAttribute('aria-live', 'polite');
        // Insert messageDiv after the form
        orderForm.parentNode.insertBefore(messageDiv, orderForm.nextSibling);

        orderForm.addEventListener('submit', async (event) => {
            event.preventDefault();
            messageDiv.textContent = ''; // Clear previous messages

            const formData = new FormData(orderForm);
            const data = Object.fromEntries(formData.entries());

            try {
                const response = await fetch('/submit_order', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(data),
                });

                const result = await response.json();

                if (response.ok) {
                    messageDiv.style.color = 'green';
                    messageDiv.textContent = `Order successful! Message: ${result.message}. Order Details: ${JSON.stringify(result.order)}`;
                    orderForm.reset(); // Clear the form
                } else {
                    messageDiv.style.color = 'red';
                    messageDiv.textContent = `Error: ${result.message || 'Failed to submit order.'}`;
                }
            } catch (error) {
                messageDiv.style.color = 'red';
                messageDiv.textContent = `Network error: ${error.message}`;
            }
        });
    });
    </script>
</body>
</html>
